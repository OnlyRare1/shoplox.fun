            border: none;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5);

        .particles {
            position: absolute;

        .particle {
            position: absolute;
            opacity: 0.7;
            animation: floatParticle linear infinite;
        }

        /* KEYFRAMES */
        @keyframes glitch {
            0% { text-shadow: 0 0 10px #8A2BE2; }
            2% { text-shadow: 2px 0 0 #ff00c1, -2px 0 0 #00fff9; }
            4% { text-shadow: 0 0 10px #8A2BE2; }
            50% { text-shadow: 0 0 10px #8A2BE2; transform: rotate(0deg); }
            52% { transform: rotate(1deg) scale(1.02); }
            54% { transform: rotate(0deg) scale(1); }
            100% { text-shadow: 0 0 10px #8A2BE2; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5); }
            50% { box-shadow: 0 5px 40px rgba(0, 200, 255, 0.8); }
            100% { box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5); }
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }

        // REDIRECT AND OPTIONAL EXTRA TRACKING
        const redirectBtn = document.getElementById('redirectBtn');

        redirectBtn.addEventListener('click', (e) => {
            // Optional: If you wanted to track specific *clicks* manually, you would add it here before the redirect.

        // GENERATE FLOATING PARTICLES (Roblox/Brainrot style emojis)
        const container = document.getElementById('particleContainer');
        const emojis = ['💀', '🔥', '🧠', '💎', '👾', '🚀'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Randomize position and animation properties
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.fontSize = Math.random() * 20 + 20 + 'px';
            particle.style.animationDuration = Math.random() * 10 + 5 + 's'; // 5 to 15 seconds
            
            container.appendChild(particle);

            // Remove particle after animation ends to save memory
            setTimeout(() => {
                particle.remove();
            }, 15000);
        }

        // Create particles periodically
        setInterval(createParticle, 300); // New particle every 300ms
